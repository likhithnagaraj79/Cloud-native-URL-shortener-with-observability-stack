name: CD

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/likhithnagaraj79/cloud-native-url-shortener-with-observability-stack
  JAVA_VERSION: "21"

jobs:
  # ── 1. push image to GHCR ─────────────────────────────────────────────────
  push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. deploy to Kubernetes ────────────────────────────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access
        id: configure
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "::notice::KUBE_CONFIG secret not set — skipping K8s deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            mkdir -p ~/.kube
            echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
            chmod 600 ~/.kube/config
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rolling deploy
        if: steps.configure.outputs.skip != 'true'
        run: |
          kubectl set image deployment/url-shortener \
            url-shortener=${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n url-shortener
          kubectl rollout status deployment/url-shortener \
            -n url-shortener --timeout=120s

      - name: Rollback on failure
        if: failure() && steps.configure.outputs.skip != 'true'
        run: kubectl rollout undo deployment/url-shortener -n url-shortener
