name: CD

on:
  push:
    branches: ["main"]

env:
  GO_VERSION: "1.26"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ── 1. push image to GHCR ─────────────────────────────────────────────────
  push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. deploy to Kubernetes ────────────────────────────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: push
    environment: production
    # Required secrets:
    #   KUBE_CONFIG     — base64-encoded kubeconfig for the target cluster
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag in deployment
        run: |
          kubectl set image deployment/url-shortener \
            url-shortener=${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n url-shortener

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/url-shortener \
            -n url-shortener \
            --timeout=120s

      - name: Verify health
        run: |
          kubectl run healthcheck --image=curlimages/curl --restart=Never --rm -i \
            -- curl -sf http://url-shortener-svc.url-shortener.svc.cluster.local/health

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed — rolling back"
          kubectl rollout undo deployment/url-shortener -n url-shortener
