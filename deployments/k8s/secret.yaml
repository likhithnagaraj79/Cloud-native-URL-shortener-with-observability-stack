# Store real values in a secrets manager (AWS Secrets Manager / GCP Secret Manager).
# This file is a template — do NOT commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secret
  namespace: url-shortener
type: Opaque
stringData:
  DB_USER: "urlshortener"
  DB_PASSWORD: "REPLACE_ME"
  REDIS_PASSWORD: ""
  APP_BASE_URL: "https://your-domain.com"
